<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analisa Teknikal</title>
  <style>
    /* Styling Flat & Berbingkai Tebal Sesuai Sketsa */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace, sans-serif;
    }

    body {
      background-color: #ffffff;
      color: #000000;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Judul Utama */
    header h1 {
      font-size: 26px;
      font-weight: 900;
      text-align: center;
      text-transform: capitalize;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }

    /* Desain Box UI */
    .card {
      border: 5px solid #000000;
      background-color: #ffffff;
      position: relative;
      width: 100%;
    }

    .indicator-title {
      position: absolute;
      top: 15px;
      left: 15px;
      font-weight: 900;
      font-size: 18px;
      color: #000000;
      line-height: 1.2;
      pointer-events: none;
      z-index: 10;
    }

    /* Ukuran khusus masing-masing panel canvas */
    .canvas-container {
      position: relative;
      width: 100%;
    }

    #chartCanvas {
      height: 350px;
    }

    #percentageCanvas {
      height: 150px;
    }

    #histogramCanvas {
      height: 160px;
    }

    canvas {
      display: block;
      width: 100%;
    }

    /* Baris Tombol Kontrol */
    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-start;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn {
      border: 4px solid #000000;
      background-color: #ffffff;
      color: #000000;
      font-weight: 900;
      font-size: 16px;
      padding: 6px 14px;
      cursor: pointer;
      text-transform: lowercase;
      transition: background-color 0.1s ease;
    }

    .btn:hover {
      background-color: #f0f0f0;
    }

    .btn.active {
      background-color: #000000;
      color: #ffffff;
    }

    /* Panel Informasi Tambahan (Tooltip/Status) */
    .info-panel {
      border: 4px solid #000000;
      background-color: #ffffff;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      min-height: 50px;
    }

    .status-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 16px;
      z-index: 20;
    }

    .status-badge {
      display: inline-block;
      padding: 2px 6px;
      background-color: #000000;
      color: #ffffff;
      font-size: 11px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Analisa teknikal</h1>
    </header>

    <!-- Box 1: Chanel Indikator -->
    <div class="card">
      <div class="indicator-title">chanel indikator</div>
      <div class="canvas-container">
        <canvas id="chartCanvas"></canvas>
        <div id="chartStatus" class="status-overlay">Memuat data...</div>
      </div>
    </div>

    <!-- Baris Tombol Kontrol -->
    <div class="controls-row">
      <div class="btn-group" id="tfGroup">
        <button class="btn active" data-tf="h1">h1</button>
        <button class="btn" data-tf="h4">h4</button>
        <button class="btn" data-tf="d1">d1</button>
      </div>
      <div class="btn-group" id="symbolGroup">
        <button class="btn active" data-symbol="GBP/USD">gbp/usd</button>
        <button class="btn" data-symbol="EUR/USD">eur/usd</button>
      </div>
      <span id="dataSourceBadge" class="status-badge" style="align-self: center;">API Terhubung</span>
    </div>

    <!-- Box 2: Prosentase Indikator -->
    <div class="card">
      <div class="indicator-title">
        <div>prosentase</div>
        <div>indikator</div>
      </div>
      <div class="canvas-container">
        <canvas id="percentageCanvas"></canvas>
      </div>
    </div>

    <!-- Box 3: Histogram Indikator -->
    <div class="card">
      <div class="indicator-title">
        <div>histogram</div>
        <div>indikator</div>
      </div>
      <div class="canvas-container">
        <canvas id="histogramCanvas"></canvas>
      </div>
    </div>

    <!-- Panel Informasi / Detail Nilai -->
    <div id="infoPanel" class="info-panel">
      Arahkan kursor pada grafik untuk melihat data teknikal terperinci.
    </div>
  </div>

  <script>
    // Konfigurasi API
    const apiKey = "8cd5e84fa4564322b907aaddac29b059";
    let currentSymbol = "GBP/USD";
    let currentTF = "h1";

    // Mapping timeframe ke interval Twelve Data
    const tfIntervalMap = {
      "h1": "1h",
      "h4": "4h",
      "d1": "1day"
    };

    // State Penyimpanan Data
    let rawData = [];
    let indicators = {};
    let hoverIndex = null;

    // Batas visualisasi lilin yang ditampilkan di layar
    const visibleBarsCount = 55;

    // Referensi Canvas
    const chartCanvas = document.getElementById('chartCanvas');
    const percentageCanvas = document.getElementById('percentageCanvas');
    const histogramCanvas = document.getElementById('histogramCanvas');
    const infoPanel = document.getElementById('infoPanel');
    const dataSourceBadge = document.getElementById('dataSourceBadge');

    // Inisialisasi Event Listener
    document.getElementById('tfGroup').addEventListener('click', (e) => {
      if (e.target.classList.contains('btn')) {
        document.querySelector('#tfGroup .btn.active').classList.remove('active');
        e.target.classList.add('active');
        currentTF = e.target.dataset.tf;
        updateDashboard();
      }
    });

    document.getElementById('symbolGroup').addEventListener('click', (e) => {
      if (e.target.classList.contains('btn')) {
        document.querySelector('#symbolGroup .btn.active').classList.remove('active');
        e.target.classList.add('active');
        currentSymbol = e.target.dataset.symbol;
        updateDashboard();
      }
    });

    // Menangani sinkronisasi crosshair gerakan mouse di seluruh canvas
    [chartCanvas, percentageCanvas, histogramCanvas].forEach(canvas => {
      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const drawWidth = rect.width - 60; // Mengabaikan margin kanan untuk label harga
        const barWidth = drawWidth / visibleBarsCount;
        
        let index = Math.floor(x / barWidth);
        if (index >= 0 && index < visibleBarsCount) {
          hoverIndex = index;
          drawAll();
          updateInfoText();
        }
      });

      canvas.addEventListener('mouseleave', () => {
        hoverIndex = null;
        drawAll();
        infoPanel.innerHTML = "Arahkan kursor pada grafik untuk melihat data teknikal terperinci.";
      });
    });

    // Siklus Pemuatan Utama
    async function updateDashboard() {
      const statusOverlay = document.getElementById('chartStatus');
      statusOverlay.style.display = 'flex';
      statusOverlay.textContent = 'Memuat data dari API...';

      try {
        const interval = tfIntervalMap[currentTF];
        rawData = await fetchTwelveData(currentSymbol, interval);
        dataSourceBadge.textContent = "API AKTIF";
        dataSourceBadge.style.backgroundColor = "#2ecc71";
      } catch (err) {
        console.warn("Kesalahan API, menggunakan data simulasi lokal:", err.message);
        rawData = generateFallbackData(currentSymbol, currentTF);
        dataSourceBadge.textContent = "SIMULASI OFFLINE";
        dataSourceBadge.style.backgroundColor = "#e74c3c";
      }

      statusOverlay.style.display = 'none';
      calculateIndicators();
      drawAll();
    }

    // Fungsi Fetch ke Twelve Data
    async function fetchTwelveData(symbol, interval) {
      const url = `https://api.twelvedata.com/time_series?symbol=${encodeURIComponent(symbol)}&interval=${interval}&apikey=${apiKey}&outputsize=150`;
      const response = await fetch(url);
      if (!response.ok) throw new Error("Koneksi gagal");
      const json = await response.json();
      if (json.status === "error") throw new Error(json.message);
      
      // Susun agar urutan indeks dari lama ke baru (kronologis)
      const values = json.values;
      values.reverse();
      return values;
    }

    // Pembuat Data Pengganti (Fallback) jika Limit API Tercapai
    function generateFallbackData(symbol, tf) {
      const mockValues = [];
      let basePrice = symbol === "GBP/USD" ? 1.2550 : 1.0850;
      let timestamp = Date.now() - 150 * 24 * 3600 * 1000;
      const step = tf === "h1" ? 3600000 : tf === "h4" ? 14400000 : 86400000;

      for (let i = 0; i < 150; i++) {
        const change = (Math.random() - 0.495) * (basePrice * 0.003);
        const open = basePrice;
        const close = basePrice + change;
        const high = Math.max(open, close) + Math.random() * (basePrice * 0.0015);
        const low = Math.min(open, close) - Math.random() * (basePrice * 0.0015);
        basePrice = close;
        timestamp += step;

        mockValues.push({
          datetime: new Date(timestamp).toISOString().slice(0, 16).replace('T', ' '),
          open: open.toFixed(5),
          high: high.toFixed(5),
          low: low.toFixed(5),
          close: close.toFixed(5)
        });
      }
      return mockValues;
    }

    // Sektor Perhitungan Indikator (Konversi Logika MQL4)
    function calculateIndicators() {
      const N = rawData.length;
      
      // 1. EMA (Formula Exponential Moving Average)
      const calcEMA = (period) => {
        const ema = new Array(N).fill(null);
        const k = 2 / (period + 1);
        let sum = 0;
        for (let i = 0; i < period; i++) sum += Number(rawData[i].close);
        let prevEma = sum / period;
        ema[period - 1] = prevEma;
        for (let i = period; i < N; i++) {
          ema[i] = Number(rawData[i].close) * k + prevEma * (1 - k);
          prevEma = ema[i];
        }
        return ema;
      };

      // 2. LWMA (Formula Linear Weighted Moving Average)
      const calcLWMA = (period) => {
        const lwma = new Array(N).fill(null);
        const weightSum = (period * (period + 1)) / 2;
        for (let i = period - 1; i < N; i++) {
          let sum = 0;
          for (let j = 0; j < period; j++) {
            sum += Number(rawData[i - period + 1 + j].close) * (j + 1);
          }
          lwma[i] = sum / weightSum;
        }
        return lwma;
      };

      // 3. ATR (Average True Range)
      const tr = new Array(N).fill(0);
      for (let i = 1; i < N; i++) {
        const h = Number(rawData[i].high);
        const l = Number(rawData[i].low);
        const pc = Number(rawData[i - 1].close);
        tr[i] = Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc));
      }
      const atr = new Array(N).fill(null);
      const atrPeriod = 14;
      let atrSum = 0;
      for (let i = 1; i <= atrPeriod; i++) atrSum += tr[i];
      let prevAtr = atrSum / atrPeriod;
      atr[atrPeriod] = prevAtr;
      const alpha = 1 / atrPeriod;
      for (let i = atrPeriod + 1; i < N; i++) {
        atr[i] = tr[i] * alpha + prevAtr * (1 - alpha);
        prevAtr = atr[i];
      }

      // Hitung Komponen Indikator Utama
      const lwma50 = calcLWMA(50);
      const ema12 = calcEMA(12);
      const ema26 = calcEMA(26);

      const upperBand = new Array(N).fill(null);
      const lowerBand = new Array(N).fill(null);
      for (let i = 0; i < N; i++) {
        if (lwma50[i] !== null && atr[i] !== null) {
          upperBand[i] = lwma50[i] + atr[i] * 2.5;
          lowerBand[i] = lwma50[i] - atr[i] * 2.5;
        }
      }

      // Logika Swing & Sinyal Gir Non-Repaint
      const buySignals = new Array(N).fill(null);
      const sellSignals = new Array(N).fill(null);
      const pipSize = currentSymbol.includes("JPY") ? 0.01 : 0.0001;

      for (let i = 2; i < N - 1; i++) {
        const low = Number(rawData[i].low);
        const high = Number(rawData[i].high);
        const lowPrev = Number(rawData[i - 1].low);
        const lowNext = Number(rawData[i + 1].low);
        const highPrev = Number(rawData[i - 1].high);
        const highNext = Number(rawData[i + 1].high);

        if (lowerBand[i] !== null) {
          if (low < lowPrev && low < lowNext) {
            if (low <= lowerBand[i] + 5 * pipSize) {
              buySignals[i] = low - 12 * pipSize;
            }
          }
        }
        if (upperBand[i] !== null) {
          if (high > highPrev && high > highNext) {
            if (high >= upperBand[i] - 5 * pipSize) {
              sellSignals[i] = high + 12 * pipSize;
            }
          }
        }
      }

      // 4. Perhitungan VBox Histogram Sub-Window
      const vboxRaw = new Array(N).fill(50);
      const lookback = 14;
      for (let i = lookback - 1; i < N; i++) {
        let hh = Number(rawData[i].high);
        let ll = Number(rawData[i].low);
        for (let k = 1; k < lookback; k++) {
          hh = Math.max(hh, Number(rawData[i - k].high));
          ll = Math.min(ll, Number(rawData[i - k].low));
        }
        const range = hh - ll;
        vboxRaw[i] = range > 0 ? ((Number(rawData[i].close) - ll) / range) * 100 : 50;
      }

      const vboxHist = new Array(N).fill(null);
      const smooth = 3;
      for (let i = lookback + smooth - 2; i < N; i++) {
        let sum = 0;
        for (let s = 0; s < smooth; s++) sum += vboxRaw[i - s];
        vboxHist[i] = sum / smooth;
      }

      indicators = {
        upperBand, lowerBand, ema12, ema26, buySignals, sellSignals, vboxHist
      };
    }

    // Fungsi Render Gambar Semua Canvas
    function drawAll() {
      // Pastikan kerapatan piksel monitor tinggi (High DPI) agar hasil rendering tajam
      const getCtx = (canvas) => {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        return { ctx, w: rect.width, h: rect.height };
      };

      const chart = getCtx(chartCanvas);
      const percent = getCtx(percentageCanvas);
      const hist = getCtx(histogramCanvas);

      // Slicing data khusus 55 bar terakhir untuk ditampilkan secara presisi
      const sliceStart = rawData.length - visibleBarsCount;
      const visibleData = rawData.slice(sliceStart);
      const vUpper = indicators.upperBand.slice(sliceStart);
      const vLower = indicators.lowerBand.slice(sliceStart);
      const vEma12 = indicators.ema12.slice(sliceStart);
      const vEma26 = indicators.ema26.slice(sliceStart);
      const vBuyS = indicators.buySignals.slice(sliceStart);
      const vSellS = indicators.sellSignals.slice(sliceStart);
      const vHist = indicators.vboxHist.slice(sliceStart);

      const drawWidth = chart.w - 60; // sisa 60px dikanan untuk label harga/skala

      // ==========================================
      // DRAW CANVAS 1: CHANEL INDIKATOR (Chart)
      // ==========================================
      const drawChart = () => {
        // Cari nilai maks & min untuk proses normalisasi skala Y
        let minVal = Infinity, maxVal = -Infinity;
        for (let i = 0; i < visibleBarsCount; i++) {
          const l = Number(visibleData[i].low);
          const h = Number(visibleData[i].high);
          minVal = Math.min(minVal, l, vLower[i] || l);
          maxVal = Math.max(maxVal, h, vUpper[i] || h);
        }
        const padding = (maxVal - minVal) * 0.08;
        minVal -= padding;
        maxVal += padding;

        const getY = (val) => chart.h - ((val - minVal) / (maxVal - minVal)) * chart.h;
        const barW = drawWidth / visibleBarsCount;

        // Gambar Grid & Skala Harga Kanan
        chart.ctx.strokeStyle = '#e0e0e0';
        chart.ctx.lineWidth = 1;
        for (let i = 1; i < 5; i++) {
          const y = (chart.h / 5) * i;
          chart.ctx.beginPath();
          chart.ctx.moveTo(0, y);
          chart.ctx.lineTo(chart.w, y);
          chart.ctx.stroke();

          // Skala label harga dikanan
          const priceVal = maxVal - ((maxVal - minVal) / 5) * i;
          chart.ctx.fillStyle = '#666666';
          chart.ctx.font = '10px Courier New';
          chart.ctx.fillText(priceVal.toFixed(5), drawWidth + 5, y + 3);
        }

        // Jalankan render Ribbon EMA 12 vs EMA 26 (Arsiran Transparan)
        for (let i = 0; i < visibleBarsCount; i++) {
          if (vEma12[i] !== null && vEma26[i] !== null) {
            const x = i * barW + barW / 2;
            const y12 = getY(vEma12[i]);
            const y26 = getY(vEma26[i]);
            chart.ctx.beginPath();
            chart.ctx.moveTo(x, y12);
            chart.ctx.lineTo(x, y26);
            chart.ctx.strokeStyle = vEma12[i] > vEma26[i] ? 'rgba(46, 204, 113, 0.25)' : 'rgba(231, 76, 60, 0.25)';
            chart.ctx.lineWidth = barW;
            chart.ctx.stroke();
          }
        }

        // Gambar Batas Saluran Atas & Bawah (Bands)
        const drawLine = (array, color) => {
          chart.ctx.beginPath();
          let started = false;
          for (let i = 0; i < visibleBarsCount; i++) {
            if (array[i] !== null) {
              const x = i * barW + barW / 2;
              const y = getY(array[i]);
              if (!started) {
                chart.ctx.moveTo(x, y);
                started = true;
              } else {
                chart.ctx.lineTo(x, y);
              }
            }
          }
          chart.ctx.strokeStyle = color;
          chart.ctx.lineWidth = 2.5;
          chart.ctx.stroke();
        };
        drawLine(vUpper, '#ff4500'); // Batas Atas (OrangeRed)
        drawLine(vLower, '#32cd32'); // Batas Bawah (LimeGreen)

        // Gambar Candlestick Harga
        for (let i = 0; i < visibleBarsCount; i++) {
          const o = Number(visibleData[i].open);
          const h = Number(visibleData[i].high);
          const l = Number(visibleData[i].low);
          const c = Number(visibleData[i].close);
          const x = i * barW + barW / 2;

          const isBull = c >= o;
          chart.ctx.strokeStyle = '#000000';
          chart.ctx.lineWidth = 1.5;

          // Wick
          chart.ctx.beginPath();
          chart.ctx.moveTo(x, getY(h));
          chart.ctx.lineTo(x, getY(l));
          chart.ctx.stroke();

          // Body Candle
          chart.ctx.fillStyle = isBull ? '#2ecc71' : '#e74c3c';
          chart.ctx.beginPath();
          chart.ctx.rect(x - barW * 0.35, getY(Math.max(o, c)), barW * 0.7, Math.abs(getY(o) - getY(c)) || 1.5);
          chart.ctx.fill();
          chart.ctx.stroke();
        }

        // Gambar Sinyal Gir (Gear Signal)
        const drawGear = (cx, cy, size, col) => {
          chart.ctx.save();
          chart.ctx.translate(cx, cy);
          chart.ctx.strokeStyle = col;
          chart.ctx.fillStyle = col;
          chart.ctx.lineWidth = 1.5;
          chart.ctx.beginPath();
          chart.ctx.arc(0, 0, size * 0.35, 0, Math.PI * 2);
          chart.ctx.stroke();
          const teeth = 8;
          for (let k = 0; k < teeth; k++) {
            chart.ctx.rotate(Math.PI / (teeth / 2));
            chart.ctx.fillRect(-size * 0.08, -size * 0.55, size * 0.16, size * 0.25);
          }
          chart.ctx.restore();
        };

        for (let i = 0; i < visibleBarsCount; i++) {
          const barW = drawWidth / visibleBarsCount;
          const x = i * barW + barW / 2;
          if (vBuyS[i] !== null) drawGear(x, getY(vBuyS[i]), barW * 1.1, '#32cd32');
          if (vSellS[i] !== null) drawGear(x, getY(vSellS[i]), barW * 1.1, '#e74c3c');
        }

        // Hover Crosshair
        if (hoverIndex !== null) {
          const hX = hoverIndex * barW + barW / 2;
          chart.ctx.strokeStyle = '#95a5a6';
          chart.ctx.setLineDash([4, 4]);
          chart.ctx.lineWidth = 1;
          chart.ctx.beginPath();
          chart.ctx.moveTo(hX, 0);
          chart.ctx.lineTo(hX, chart.h);
          chart.ctx.stroke();
          chart.ctx.setLineDash([]);
        }
      };

      // ==========================================
      // DRAW CANVAS 2: PROSENTASE INDIKATOR (Kekuatan)
      // ==========================================
      const drawPercentage = () => {
        // Blok-pembagi harian (24 bar untuk H1)
        const blockSize = currentTF === "h1" ? 24 : 10;
        const blocks = [];
        let curBlock = [];

        for (let i = 0; i < visibleBarsCount; i++) {
          curBlock.push({ index: i, val: visibleData[i] });
          if (curBlock.length === blockSize || i === visibleBarsCount - 1) {
            blocks.push(curBlock);
            curBlock = [];
          }
        }

        const barW = drawWidth / visibleBarsCount;

        // Background dan Grid Pembatas Blok
        percent.ctx.strokeStyle = '#cccccc';
        percent.ctx.setLineDash([3, 3]);
        percent.ctx.lineWidth = 1;

        // Garis Tengah Grid pembatas buy/sell
        percent.ctx.beginPath();
        percent.ctx.moveTo(0, percent.h / 2);
        percent.ctx.lineTo(drawWidth, percent.h / 2);
        percent.ctx.stroke();

        blocks.forEach((blk, idx) => {
          const startX = blk[0].index * barW;
          const endX = (blk[blk.length - 1].index + 1) * barW;

          // Garis Vertikal pembatas blok
          if (idx > 0) {
            percent.ctx.beginPath();
            percent.ctx.moveTo(startX, 0);
            percent.ctx.lineTo(startX, percent.h);
            percent.ctx.stroke();
          }

          // Kalkulasi volume badan lilin (Kekuatan Buy vs Sell)
          let sumBuy = 0, sumSell = 0;
          blk.forEach(b => {
            const o = Number(b.val.open);
            const c = Number(b.val.close);
            if (c > o) sumBuy += (c - o);
            else if (c < o) sumSell += (o - c);
          });

          const total = sumBuy + sumSell;
          let buyPct = 50, sellPct = 50;
          if (total > 0) {
            buyPct = Math.round((sumBuy / total) * 100);
            sellPct = Math.round((sumSell / total) * 100);
          }

          // Gambar visualisasi persentase teks
          const midX = startX + (endX - startX) / 2;
          percent.ctx.setLineDash([]);
          percent.ctx.textAlign = 'center';
          percent.ctx.font = 'bold 12px Courier New';

          // Teks Sell (Atas)
          percent.ctx.fillStyle = '#d35400';
          percent.ctx.fillText(`sell ${sellPct} %`, midX, percent.h * 0.35);

          // Teks Buy (Bawah)
          percent.ctx.fillStyle = '#1e824c';
          percent.ctx.fillText(`buy ${buyPct} %`, midX, percent.h * 0.72);
        });

        // Hover Crosshair
        if (hoverIndex !== null) {
          const hX = hoverIndex * barW + barW / 2;
          percent.ctx.strokeStyle = '#95a5a6';
          percent.ctx.setLineDash([4, 4]);
          percent.ctx.beginPath();
          percent.ctx.moveTo(hX, 0);
          percent.ctx.lineTo(hX, percent.h);
          percent.ctx.stroke();
          percent.ctx.setLineDash([]);
        }
      };

      // ==========================================
      // DRAW CANVAS 3: HISTOGRAM INDIKATOR
      // ==========================================
      const drawHistogram = () => {
        const barW = drawWidth / visibleBarsCount;
        const getY = (val) => hist.h - (val / 100) * hist.h;

        // Batas Referensi Level 15 (Aqua) dan 85 (Gold)
        hist.ctx.strokeStyle = '#00ced1'; // Aqua line 15
        hist.ctx.setLineDash([4, 4]);
        hist.ctx.beginPath();
        hist.ctx.moveTo(0, getY(15));
        hist.ctx.lineTo(drawWidth, getY(15));
        hist.ctx.stroke();

        hist.ctx.strokeStyle = '#ffb300'; // Gold line 85
        hist.ctx.beginPath();
        hist.ctx.moveTo(0, getY(85));
        hist.ctx.lineTo(drawWidth, getY(85));
        hist.ctx.stroke();
        hist.ctx.setLineDash([]);

        // Gambar Histogram VBox
        for (let i = 0; i < visibleBarsCount; i++) {
          if (vHist[i] !== null) {
            const x = i * barW + barW / 2;
            const hVal = vHist[i];
            const y = getY(hVal);

            const isBull = Number(visibleData[i].close) >= Number(visibleData[i].open);
            hist.ctx.fillStyle = isBull ? '#3498db' : '#e91e63'; // DodgerBlue vs DeepPink

            hist.ctx.fillRect(x - barW * 0.3, y, barW * 0.6, hist.h - y);

            // Panah Sinyal Sub-Window
            const drawArrow = (ax, ay, isUp, color) => {
              hist.ctx.fillStyle = color;
              hist.ctx.beginPath();
              if (isUp) {
                hist.ctx.moveTo(ax, ay);
                hist.ctx.lineTo(ax - 4, ay + 7);
                hist.ctx.lineTo(ax - 1.5, ay + 7);
                hist.ctx.lineTo(ax - 1.5, ay + 13);
                hist.ctx.lineTo(ax + 1.5, ay + 13);
                hist.ctx.lineTo(ax + 1.5, ay + 7);
                hist.ctx.lineTo(ax + 4, ay + 7);
              } else {
                hist.ctx.moveTo(ax, ay);
                hist.ctx.lineTo(ax - 4, ay - 7);
                hist.ctx.lineTo(ax - 1.5, ay - 7);
                hist.ctx.lineTo(ax - 1.5, ay - 13);
                hist.ctx.lineTo(ax + 1.5, ay - 13);
                hist.ctx.lineTo(ax + 1.5, ay - 7);
                hist.ctx.lineTo(ax + 4, ay - 7);
              }
              hist.ctx.closePath();
              hist.ctx.fill();
            };

            if (hVal < 15) {
              drawArrow(x, hist.h - 15, true, '#000000'); // Arrow Up
            } else if (hVal >= 85) {
              drawArrow(x, 15, false, '#ff1493'); // Arrow Down
            }
          }
        }

        // Hover Crosshair
        if (hoverIndex !== null) {
          const hX = hoverIndex * barW + barW / 2;
          hist.ctx.strokeStyle = '#95a5a6';
          hist.ctx.setLineDash([4, 4]);
          hist.ctx.beginPath();
          hist.ctx.moveTo(hX, 0);
          hist.ctx.lineTo(hX, hist.h);
          hist.ctx.stroke();
          hist.ctx.setLineDash([]);
        }
      };

      // Eksekusi render ketiga canvas
      drawChart();
      drawPercentage();
      drawHistogram();
    }

    // Fungsi Pengatur Teks Informasi (Interaktif Hover)
    function updateInfoText() {
      if (hoverIndex === null) return;
      const sliceStart = rawData.length - visibleBarsCount;
      const index = sliceStart + hoverIndex;
      const data = rawData[index];

      const c = Number(data.close).toFixed(5);
      const o = Number(data.open).toFixed(5);
      const h = Number(data.high).toFixed(5);
      const l = Number(data.low).toFixed(5);

      const upper = indicators.upperBand[index] ? indicators.upperBand[index].toFixed(5) : "N/A";
      const lower = indicators.lowerBand[index] ? indicators.lowerBand[index].toFixed(5) : "N/A";
      const vbox = indicators.vboxHist[index] ? indicators.vboxHist[index].toFixed(1) : "N/A";

      infoPanel.innerHTML = `
        <strong>Tanggal:</strong> ${data.datetime} | 
        <strong>OHLC:</strong> O:${o} H:${h} L:${l} C:${c} <br/>
        <strong>Upper Band:</strong> ${upper} | 
        <strong>Lower Band:</strong> ${lower} | 
        <strong>VBox Hist:</strong> ${vbox}
      `;
    }

    // Eksekusi Pemuatan Awal Saat Halaman Dibuka
    updateDashboard();

    // Responsif jika window browser diubah ukurannya
    window.addEventListener('resize', drawAll);
  </script>
</body>
</html>
